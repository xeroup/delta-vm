name: CI

on:
  push:
    branches: [main, master]
    tags: ["v*"]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build & Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            artifact: dvm-linux-x86_64
          - os: macos-14
            artifact: dvm-macos-arm64
          - os: windows-2022
            artifact: dvm-windows-x86_64

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Build (release)
        run: cargo build --release

      - name: Run tests
        run: cargo test --workspace

      # collect binaries into dist/ - upload-artifact will zip this folder itself
      - name: Collect binaries (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p dist
          cp target/release/dvm target/release/das target/release/installer dist/

      - name: Collect binaries (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist | Out-Null
          Copy-Item target/release/dvm.exe, target/release/das.exe, target/release/installer.exe dist/

      # upload-artifact zips dist/ contents directly - no zip-in-zip
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/
          retention-days: 30

      # for releases: zip dist/ and attach to GitHub Release
      - name: Package for release (Unix)
        if: startsWith(github.ref, 'refs/tags/v') && runner.os != 'Windows'
        run: cd dist && zip -r ../${{ matrix.artifact }}.zip .

      - name: Package for release (Windows)
        if: startsWith(github.ref, 'refs/tags/v') && runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path dist/* -DestinationPath "${{ matrix.artifact }}.zip"

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.artifact }}.zip
          generate_release_notes: true
